# Application identity and startup banner.
# Docs: https://quarkus.io/guides/all-config
quarkus.application.name=quarkus-ms-demo
quarkus.banner.path=banner.txt

# HTTP CORS policy for browser clients.
# Docs: https://quarkus.io/guides/security-cors
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=*

# Datasource and ORM bootstrap for local H2 + SQL seed.
# Docs: https://quarkus.io/guides/datasource and https://quarkus.io/guides/hibernate-orm
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:default
quarkus.datasource.jdbc.telemetry=true
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
quarkus.hibernate-orm.sql-load-script=import.sql

# Info endpoint metadata published at /q/info.
# Docs: https://quarkus.io/guides/info
quarkus.info.enabled=true
quarkus.info.build.enabled=true
quarkus.info.git.enabled=true

# Metrics via Micrometer and common runtime binders.
# Docs: https://quarkus.io/guides/telemetry-micrometer
quarkus.micrometer.enabled=true
quarkus.micrometer.binder.http-server.enabled=true
quarkus.micrometer.binder.jvm=true
quarkus.micrometer.binder.system=true

# Distributed tracing exporter and sampling strategy.
# Docs: https://quarkus.io/guides/opentelemetry
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
quarkus.otel.exporter.otlp.protocol=${OTEL_EXPORTER_OTLP_PROTOCOL:grpc}
quarkus.otel.exporter.otlp.headers=${OTEL_EXPORTER_OTLP_HEADERS:}
quarkus.otel.traces.sampler=${OTEL_TRACES_SAMPLER:parentbased_traceidratio}
quarkus.otel.traces.sampler.arg=${OTEL_TRACES_SAMPLER_ARG:1.0}
quarkus.otel.resource.attributes=deployment.environment=${DEPLOYMENT_ENVIRONMENT:dev},service.namespace=acme

# Console log pattern including correlation and trace fields.
# Docs: https://quarkus.io/guides/logging
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p requestId=%X{requestId},traceId=%X{traceId},spanId=%X{spanId},sampled=%X{sampled} [%c{2.}] (%t) %s%e%n

# Profile-specific overrides for local development and tests.
# Docs: https://quarkus.io/guides/config-reference#profiles
quarkus.otel.exporter.otlp.enabled=true
%dev.quarkus.datasource.dev-ui.allow-sql=true
%test.quarkus.otel.sdk.disabled=true

# Jackson serialization defaults for REST payload optimization.
# Docs: https://quarkus.io/guides/rest#json-serialisation
quarkus.jackson.serialization-inclusion=non-empty
quarkus.rest.jackson.optimization.enable-reflection-free-serializers=true

# OpenAPI document metadata and embedded Swagger UI.
# Docs: https://quarkus.io/guides/openapi-swaggerui
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.info-title=Swagger Petstore
quarkus.smallrye-openapi.info-version=1.0.7
quarkus.smallrye-openapi.info-description=Petstore-compatible API implemented on top of the existing Quarkus project structure.
