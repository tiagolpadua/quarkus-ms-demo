services:
  # OpenTelemetry Collector - receives traces from app and exports to Jaeger
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "9411:9411"   # Zipkin receiver
      - "8888:8888"   # Collector internal metrics port
      - "8889:8889"   # Exported Prometheus metrics port
      - "13133:13133" # OTEL Collector health check
    volumes:
      - ./otelcol-config.yaml:/etc/otelcol-config.yaml
    command:
      - "--config=/etc/otelcol-config.yaml"
    environment:
      - GOGC=80
    depends_on:
      - jaeger
    networks:
      - quarkus-network
  # Jaeger - distributed tracing backend
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "6831:6831/udp"  # Jaeger agent - thrift compact thrift protocol
      - "16686:16686"    # Jaeger UI
      - "14250:14250"    # Jaeger gRPC receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - COLLECTOR_OTLP_HOST_PORT=0.0.0.0:4317
    networks:
      - quarkus-network
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider -q http://localhost:16686/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Quarkus Application
  app:
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: quarkus-app
    ports:
      - "8080:8080"
    environment:
      # OTEL Configuration
      - OTEL_SDK_DISABLED=false
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_RESOURCE_ATTRIBUTES=service.name=quarkus-ms-demo,service.version=1.0.0
      - DEPLOYMENT_ENVIRONMENT=docker-compose
      # Quarkus Configuration
      - QUARKUS_LOG_LEVEL=INFO
      - QUARKUS_HTTP_HOST=0.0.0.0
      - QUARKUS_HTTP_PORT=8080
    depends_on:
      otel-collector:
        condition: service_started
      jaeger:
        condition: service_started
    networks:
      - quarkus-network
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider -q http://localhost:8080/q/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    stdin_open: true
    tty: true

networks:
  quarkus-network:
    driver: bridge
