receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  prometheus:
    config:
      scrape_configs:
        - job_name: 'otel-collector'
          scrape_interval: 10s
          static_configs:
            - targets: ['localhost:8888']

processors:
  # Batch processing for better performance
  batch:
    send_batch_size: 1024
    timeout: 5s

  # Memory limiter to prevent memory exhaustion
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  # Add attributes to spans
  attributes:
    actions:
      - key: environment
        value: local
        action: insert

exporters:
  # Export to Jaeger via gRPC
  jaeger:
    endpoint: jaeger:14250
    tls:
      insecure: true

  # Optional: Prometheus exporter for metrics
  prometheus:
    endpoint: "0.0.0.0:8888"
    namespace: otel
    const_labels:
      environment: local

  # Logging exporter for debugging
  logging:
    loglevel: debug

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, attributes]
      exporters: [jaeger, logging]

    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
